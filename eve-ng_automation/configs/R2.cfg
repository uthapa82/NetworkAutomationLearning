!
hostname R2
!
no ip domain lookup
ip cef
!
! Interface configurations
interface Loopback0
 description 10.0.0.2/32
 ip address 10.0.0.2 255.255.255.255
 no shutdown
!
interface Loopback1
 description 172.17.0.2/32
 ip address 172.17.0.2 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/0
 description Connected to R1 | 172.16.0.2/30
 ip address 172.16.0.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description 172.16.0.17/30
 ip address 172.16.0.17 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/3
 description Connected to R3 | 172.16.0.9/30
 ip address 172.16.0.9 255.255.255.252
 no shutdown
!
! EIGRP Configuration
router eigrp 100
 !
 ! Physical Links
 network 172.16.0.0 0.0.0.3   ! G0/0 172.16.0.2/30
 network 172.16.0.8 0.0.0.3   ! G0/3 172.16.0.9/30
 network 172.16.0.16 0.0.0.3  ! G0/2 172.16.0.17/30
 !
 ! Loopback Interfaces
 network 10.0.0.2 0.0.0.0      ! Loopback0 10.0.0.2/32
 network 172.17.0.2 0.0.0.0    ! Loopback1 172.17.0.2/32
 !
 no auto-summary

!
! Line configurations
line con 0
 logging synchronous
 exec-timeout 0 0
!
line vty 0 4
 login
 transport input all
!
end