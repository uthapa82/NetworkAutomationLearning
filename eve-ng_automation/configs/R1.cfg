!
hostname R1
!
no ip domain lookup
ip cef
!
! Interface configurations
interface Loopback0
 description 10.0.0.1/32
 ip address 10.0.0.1 255.255.255.255
 no shutdown
!
interface Loopback1
 description 10.1.0.1/16
 ip address 10.1.0.1 255.255.0.0
 no shutdown
!
interface Loopback2
 description 10.2.0.1/17
 ip address 10.2.0.1 255.255.128.0
 no shutdown
!
interface Loopback3
 description 10.3.0.1/18
 ip address 10.3.0.1 255.255.192.0
 no shutdown
!
interface Loopback4
 description 10.4.0.1/19
 ip address 10.4.0.1 255.255.224.0
 no shutdown
!
interface Loopback5
 description 10.5.0.1/20
 ip address 10.5.0.1 255.255.240.0
 no shutdown
!
interface GigabitEthernet0/0
 description Connected to R2 | 172.16.0.1/30
 ip address 172.16.0.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description Connected to R3 | 172.16.0.5/30
 ip address 172.16.0.5 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description 172.16.0.13/30
 ip address 172.16.0.13 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/3
 description 172.17.0.1/21
 ip address 172.17.0.1 255.255.248.0
 no shutdown
!
! EIGRP Configuration
router eigrp 100
 !
 ! Physical Interfaces
 network 172.16.0.0 0.0.0.3   ! G0/0 172.16.0.1/30
 network 172.16.0.4 0.0.0.3   ! G0/1 172.16.0.5/30
 network 172.16.0.12 0.0.0.3  ! G0/2 172.16.0.13/30
 network 172.17.0.0 0.0.7.255 ! G0/3 172.17.0.1/21
 !
 ! Loopback Interfaces
 network 10.0.0.1 0.0.0.0      ! Loopback0 10.0.0.1/32
 network 10.1.0.0 0.0.255.255  ! Loopback1 10.1.0.1/16
 network 10.2.0.0 0.0.127.255  ! Loopback2 10.2.0.1/17
 network 10.3.0.0 0.0.63.255   ! Loopback3 10.3.0.1/18
 network 10.4.0.0 0.0.31.255   ! Loopback4 10.4.0.1/19
 network 10.5.0.0 0.0.15.255   ! Loopback5 10.5.0.1/20
 !
 no auto-summary

!
! Line configurations
line con 0
 logging synchronous
 exec-timeout 0 0
!
line vty 0 4
 login
 transport input all
!
end