!
hostname R1
!
no ip domain lookup
ip cef
!
! Interface configurations
interface Loopback0
 ip address 10.0.0.1 255.255.255.0
 no shutdown
!
interface Loopback1
 ip address 10.1.0.1 255.255.255.240
 no shutdown
!
interface Loopback2
 ip address 10.2.0.1 255.255.255.248
 no shutdown
!
interface Loopback3
 ip address 10.3.0.1 255.255.255.252
 no shutdown
!
interface Loopback4
 ip address 10.4.0.1 255.255.255.254
 no shutdown
!
interface Loopback5
 ip address 10.5.0.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/0
 description Connected to R2
 ip address 172.16.0.1 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/1
 description Connected to R3
 ip address 172.16.0.5 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 ip address 172.16.0.13 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/3
 ip address 172.17.0.1 255.255.248.0
 no shutdown
!
! EIGRP Configuration
router eigrp 100
 network 172.16.0.0 0.0.0.3
 network 172.16.0.4 0.0.0.3
 network 172.16.0.12 0.0.0.3
 network 172.17.0.0 0.0.7.255
 network 10.0.0.0 0.0.0.255
 network 10.1.0.0 0.0.0.15
 network 10.2.0.0 0.0.0.7
 network 10.3.0.0 0.0.0.3
 network 10.4.0.0 0.0.0.1
 network 10.5.0.0 0.0.0.3
 no auto-summary
!
! Line configurations
line con 0
 logging synchronous
 exec-timeout 0 0
!
line vty 0 4
 login
 transport input all
!
end