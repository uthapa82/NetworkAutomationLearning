!
hostname R3
!
no ip domain lookup
ip cef
!
! Interface configurations
interface Loopback0
 description 10.0.0.3/32
 ip address 10.0.0.3 255.255.255.255
 no shutdown
!
interface Loopback1
 description 172.17.0.3/32
 ip address 172.17.0.3 255.255.255.255
 no shutdown
!
interface GigabitEthernet0/1
 description Connected to R1 | 172.16.0.6/30
 ip address 172.16.0.6 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/2
 description 172.16.0.21/30
 ip address 172.16.0.21 255.255.255.252
 no shutdown
!
interface GigabitEthernet0/3
 description Connected to R2 | 172.16.0.10/30
 ip address 172.16.0.10 255.255.255.252
 no shutdown
!
! EIGRP Configuration
router eigrp 100
 !
 ! Physical Interfaces
 network 172.16.0.4 0.0.0.3    ! G0/3 172.16.0.10/30
 network 172.16.0.8 0.0.0.3    ! G0/1 172.16.0.6/30
 network 172.16.0.20 0.0.0.3   ! G0/2 172.16.0.21/30
 !
 ! Loopback Interfaces
 network 10.0.0.3 0.0.0.0       ! Loopback0 10.0.0.3/32
 network 172.17.0.3 0.0.0.0    ! Loopback1 172.17.0.3/32
 !
 no auto-summary

 no auto-summary

! Line configurations
line con 0
 logging synchronous
 exec-timeout 0 0
!
line vty 0 4
 login
 transport input all
!
end