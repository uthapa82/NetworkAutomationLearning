lab:
  name: "Sample-6-Router-Topology"
  path: "/"
  nodes:
    - name: "R1"
      template: "vios"
      image: "vios-adventerprisek9-m.SPA.159-3.M6"
    - name: "R2"
      template: "vios"
      image: "vios-adventerprisek9-m.SPA.159-3.M6"
    - name: "R3"
      template: "vios"
      image: "vios-adventerprisek9-m.SPA.159-3.M6"
    - name: "R4"
      template: "vios"
      image: "vios-adventerprisek9-m.SPA.159-3.M6"
    - name: "R5"
      template: "vios"
      image: "vios-adventerprisek9-m.SPA.159-3.M6"
    - name: "R6"
      template: "vios"
      image: "vios-adventerprisek9-m.SPA.159-3.M6"

  links:
    # Core links
    - endpoints: ["R1:Gi0/0", "R2:Gi0/0"]
    - endpoints: ["R1:Gi0/1", "R3:Gi0/1"]
    - endpoints: ["R2:Gi0/1", "R4:Gi0/0"]
    - endpoints: ["R3:Gi0/2", "R4:Gi0/1"]
    - endpoints: ["R4:Gi0/2", "R5:Gi0/0"]
    - endpoints: ["R5:Gi0/1", "R6:Gi0/0"]
    - endpoints: ["R6:Gi0/1", "R3:Gi0/3"]

    # Optional cross-links for redundancy
    - endpoints: ["R2:Gi0/2", "R5:Gi0/2"]
    - endpoints: ["R1:Gi0/2", "R6:Gi0/2"]
